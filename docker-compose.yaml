services:
  neo4j:
    image: neo4j:5.20
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j12345
    volumes:
      - neo4j_data:/data

  neo-collector-adx:
    build: .
    depends_on:
      - neo4j
    env_file:
      - .env
    volumes:
      - ./config.demo.yaml:/app/config.demo.yaml:ro
    command: ["--config", "/app/config.demo.yaml", "--once"]

volumes:
  neo4j_data:
